<!--
  Interaction Thesis:
  "The user just landed on Astro-Volga Bank for the first time. They're curious but guarded.
  They arrive from search or an ad. They want to feel that this bank is different — rooted,
  vast, trustworthy. The unforgettable micro-moment is the atmospheric river-at-sunset
  background that breathes depth and calm authority before any content appears."

  Phase 1: Background atmosphere only — recreating ФОН.png (Volga river sunset) in CSS.
  No content. Full viewport. Mood, color, depth, texture.
-->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Астро-Волга Банк</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .atmosphere {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;

      /* Layer 1: Base sky-to-water gradient
         Dark navy top → muted steel blue → warm amber glow at horizon → reflected warm water below */
      background:
        /* Layer 4: Subtle radial sun glow at the horizon center */
        radial-gradient(
          ellipse 40% 25% at 50% 54%,
          rgba(255, 225, 150, 0.35) 0%,
          rgba(255, 200, 100, 0.15) 30%,
          transparent 70%
        ),
        /* Layer 3: Bright sun reflection streak on water — narrow vertical band */
        radial-gradient(
          ellipse 8% 40% at 50% 65%,
          rgba(255, 235, 180, 0.30) 0%,
          rgba(255, 215, 140, 0.10) 40%,
          transparent 80%
        ),
        /* Layer 2: Warm horizon band — golden glow across the middle */
        linear-gradient(
          180deg,
          transparent 40%,
          rgba(200, 160, 80, 0.15) 50%,
          rgba(220, 180, 100, 0.20) 54%,
          rgba(200, 160, 80, 0.12) 58%,
          transparent 70%
        ),
        /* Layer 1: Main sky-to-water gradient */
        linear-gradient(
          180deg,
          #0a0e1f 0%,            /* near-black at very top */
          #111832 8%,            /* deep navy */
          #1B1F3B 18%,           /* Dark Navy token */
          #2a3358 30%,           /* muted navy-blue */
          #4a5575 40%,           /* steel blue-gray sky near horizon */
          #7a8095 48%,           /* lighter gray-blue haze */
          #9a9585 52%,           /* warm gray — atmospheric haze at horizon */
          #8a8070 56%,           /* muted warm tone — top of water */
          #5a5a60 62%,           /* water — darker reflection */
          #3a3e50 70%,           /* water — deeper */
          #252840 80%,           /* water — dark navy reflection */
          #12152B 95%            /* Dark Navy Deep token — bottom */
        );
    }

    /* Atmospheric haze — soft warm glow around the sun position */
    .atmosphere::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        /* Wide atmospheric scatter from sun */
        radial-gradient(
          ellipse 70% 35% at 50% 53%,
          rgba(255, 230, 170, 0.12) 0%,
          rgba(200, 180, 130, 0.06) 40%,
          transparent 70%
        ),
        /* Slight vignette — darker corners */
        radial-gradient(
          ellipse 80% 80% at 50% 50%,
          transparent 40%,
          rgba(10, 14, 31, 0.3) 100%
        );
      pointer-events: none;
    }

    /* Noise texture — design system token */
    .atmosphere::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="atmosphere"></div>
</body>
</html>
